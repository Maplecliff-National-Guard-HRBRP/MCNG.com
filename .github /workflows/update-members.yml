name: Update Discord Members

on:
  schedule:
    - cron: "0 0 * * 0"   # Every Sunday at midnight UTC
  workflow_dispatch:        # Also lets you run it manually from GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install discord.py

      - name: Run bot script
        env:
          DISCORD_TOKEN:    ${{ secrets.DISCORD_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        run: python fetch_members.py

      - name: Commit & push members.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add members.json
          git diff --cached --quiet || git commit -m "chore: update members $(date -u '+%Y-%m-%d')"
          git push
